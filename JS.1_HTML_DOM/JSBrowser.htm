<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>System Information Browser</title>
</head>
<!-- 	Acesso a informação de sistema
	exemplo de manipulação de classes e objectos de sistema e browser - Objectos DOM
	-  Objecto NAVIGATOR : o browser
	acesso a atributos de objectos DOM
-->
<body>
<!-- 	Atributos de objectos DOM
	Cada um dos objectos HTML DOM tem um conjunto de atributos próprios.
	No presente ficheiro mostra-se o exemplo para o objecto NAVIGATOR
	Noutros documentos serão apresentados exemplos para o elementos "correntes" de HTML DOM
-->

<script type="text/javascript">
var x = navigator
document.write("CodeName=" + x.appCodeName)
document.write("<br />")
document.write("MinorVersion=" + x.appMinorVersion)
document.write("<br />")
document.write("Name=" + x.appName)
document.write("<br />")
document.write("Version=" + x.appVersion)
document.write("<br />")
document.write("CookieEnabled=" + x.cookieEnabled)
document.write("<br />")
document.write("CPUClass=" + x.cpuClass)
document.write("<br />")
document.write("OnLine=" + x.onLine)
document.write("<br />")
document.write("Platform=" + x.platform)
document.write("<br />")
document.write("UA=" + x.userAgent)
document.write("<br />")
document.write("BrowserLanguage=" + x.browserLanguage)
document.write("<br />")
document.write("SystemLanguage=" + x.systemLanguage)
document.write("<br />")
document.write("UserLanguage=" + x.userLanguage)
</script>

</body>
</html>
