<html lang="pt-PT">
<!-- Utilização tipo 1 -  criação de paginas dinamicas com DHTML
- sintaxe javascript
- eventos de páginas de internet
-->

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>JavaScript - Exemplo DHTML</title>
		<style type="text/css">
<!--
			a:link 		{color: 		white;
					 font-family: 		verdana;
					 font-size: 		12
					}
			a:active 	{color: 		yellow}
			a:visited	{color: 		White;
					 text-decoration: 	none;
					 font-family: 		verdana;
					 font-size: 		12
					}
			font.verde	{color: 			Green;
					 text-decoration: 	underline;
					 text-transform: 	uppercase;
					 font-family: 		verdana;
					 font-size: 		14;
					 position:			absolute;
					 left:				50px;
					}		
-->
		</Style>
		<script language="javascript" type="text/javascript">
		function mudaTexto(){
				document.getElementById('textoMudar').style.backgroundColor='green';
				document.getElementById('textoMudar').style.textDecoration='none';
				//window.textoMudar.style.textDecorationNone;
				document.getElementById('textoMudar').style.color='white';
				document.getElementById('textoMudar').innerHTML="texto Mudado"
				}
		
		function repoeTexto(){
				document.getElementById('textoMudar').style.backgroundColor='white';
				document.getElementById('textoMudar').style.textDecoration='underline';
				//window.textoMudar.style.textDecorationNone;
				document.getElementById('textoMudar').style.color='green';
				document.getElementById('textoMudar').innerHTML="Texto a Mudar"
				}
		</script>
	</head>
	<body>
		<font class="verde" id="textoMudar" onmouseover="mudaTexto()" onmouseout="repoeTexto()">
			Texto a mudar
		</font>
	</body>
</html>
